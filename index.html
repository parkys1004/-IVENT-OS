    <script>
      // 카카오톡 인앱 브러우저에서 외부 브라우저(크롬, 사파리 등)로 실행 유도
      var userAgent = navigator.userAgent.toLowerCase();
      var targetUrl = location.href;

      if (userAgent.match(/kakaotalk/i)) {
        // 안드로이드
        if (userAgent.match(/android/i)) {
          location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=http;package=com.android.chrome;end';
        } 
        // iOS
        else if (userAgent.match(/iphone|ipad|ipod/i)) {
          location.href = 'kakaotalk://web/openExternalApp?url=' + encodeURIComponent(targetUrl);
        }
      }
    </script>
  </head>
  <body>
    <div id="root" translate="no"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
