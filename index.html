  <script>
  // 카카오톡 인앱 브라우저에서만 외부 브라우저로 유도
  function redirectKakaoInApp() {
    var ua = navigator.userAgent.toLowerCase();
    if (!ua.match(/kakaotalk/i)) return; // 카카오 인앱이 아니면 즉시 종료

    var targetUrl = location.href;
    if (ua.match(/android/i)) {
      location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
    } else if (ua.match(/iphone|ipad|ipod/i)) {
      // iOS: 딥링크 실패 시 아무것도 하지 않음 (타이머 제거)
      location.href = 'kakaotalk://web/openExternalApp?url=' + encodeURIComponent(targetUrl);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', redirectKakaoInApp);
  } else {
    redirectKakaoInApp();
  }
</script>
